<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App Modern</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-color: #38bdf8;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- LOGIN PAGE --- */
        #login-page {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .login-card h2 {
            margin-bottom: 20px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .login-card input {
            width: 100%;
            padding: 12px 15px;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        .login-card input:focus {
            border-color: var(--primary-color);
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            border: none;
            border-radius: 10px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* --- MAIN APP INTERFACE --- */
        #app-header {
            padding: 15px 20px;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .menu-btn {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-color);
        }

        .app-title {
            margin-left: 20px;
            font-weight: 600;
            font-size: 18px;
        }

        /* --- SIDEBAR (GARIS 3) --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #1e293b;
            z-index: 999;
            transition: 0.3s ease;
            padding: 80px 20px 20px 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-btn {
            width: 100%;
            padding: 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 998;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* --- MAIN CONTENT WINDOW --- */
        #content-container {
            flex: 1;
            position: relative;
            overflow-y: auto;
            padding: 20px;
        }

        .tab-content {
            position: absolute;
            inset: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s;
        }

        .tab-content.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .maintenance-text {
            font-size: 20px;
            color: var(--text-muted);
            text-align: center;
            font-weight: 300;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* --- ACCOUNT PAGE SPECIFIC --- */
        .profile-container {
            text-align: center;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .profile-box {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #475569;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            border: 3px solid var(--primary-color);
            position: relative;
        }

        .profile-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-box i {
            font-size: 40px;
            color: #94a3b8;
        }

        .profile-info h3 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .profile-hint {
            font-size: 12px;
            color: var(--primary-color);
            margin-top: 10px;
            min-height: 18px;
        }

        /* Crop Modal Sederhana */
        .crop-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .crop-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .crop-box {
            width: 250px;
            height: 250px;
            border: 2px dashed var(--primary-color);
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .crop-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- BOTTOM NAVIGATION BAR --- */
        #bottom-nav {
            height: 70px;
            background: var(--card-bg);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
            flex: 1;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item.active i {
            transform: translateY(-2px);
        }

        /* Hide utilities */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. HALAMAN LOGIN -->
    <div id="login-page">
        <div class="login-card">
            <h2>Masuk Aplikasi</h2>
            <input type="text" id="username-input" placeholder="Masukkan nama lo..." autocomplete="off">
            <button onclick="handleLogin()">Masuk</button>
        </div>
    </div>

    <!-- OVERLAY & SIDEBAR -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <button class="sidebar-btn">On Maintance</button>
    </div>

    <!-- INTERFACE UTAMA -->
    <!-- Header Atas -->
    <div id="app-header">
        <i class="fa-solid fa-bars menu-btn" onclick="toggleSidebar()"></i>
        <div class="app-title" id="header-title">Home</div>
    </div>

    <!-- Wadah Konten Utama Tab (SPA) -->
    <div id="content-container">
        <!-- Tab Home -->
        <div id="tab-home" class="tab-content active">
            <div class="maintenance-text">Maintance cuy</div>
        </div>

        <!-- Tab Chat Public -->
        <div id="tab-chat" class="tab-content">
            <div class="maintenance-text">Maintance cuy</div>
        </div>

        <!-- Tab Music -->
        <div id="tab-music" class="tab-content">
            <div class="maintenance-text">Maintance cuy</div>
        </div>

        <!-- Tab Account -->
        <div id="tab-account" class="tab-content">
            <div class="profile-container">
                <div class="profile-box" onclick="handleProfileClick()">
                    <!-- Default icon kosong, nanti diganti gambar via JS -->
                    <i class="fa-solid fa-user" id="profile-icon"></i>
                    <img id="profile-img" class="hidden" src="" alt="Profile">
                </div>
                <div class="profile-info">
                    <h3 id="user-display-name">Nama User</h3>
                    <div class="profile-hint" id="profile-hint-text"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ELEMEN MODAL UNTUK CROP FOTO -->
    <div class="crop-modal" id="crop-modal">
        <h3 style="margin-bottom: 15px;">Sesuaikan Profil</h3>
        <div class="crop-box">
            <img id="crop-preview" src="" alt="Preview">
        </div>
        <button class="login-card" style="width: auto; padding: 10px 40px;" onclick="saveCroppedImage()">Selesai</button>
    </div>

    <!-- Input file tersembunyi untuk ambil foto -->
    <input type="file" id="file-input" accept="image/*" class="hidden" onchange="onFileSelected(event)">

    <!-- 2. BOTTOM NAVIGATION BAR -->
    <div id="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="switchTab('chat', this)">
            <i class="fa-solid fa-comments"></i>
            <span>Chat Public</span>
        </div>
        <div class="nav-item" onclick="switchTab('music', this)">
            <i class="fa-solid fa-music"></i>
            <span>Music</span>
        </div>
        <div class="nav-item" onclick="switchTab('account', this)">
            <i class="fa-solid fa-circle-user"></i>
            <span>Account</span>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        let clickCount = 0;
        let tempImgData = ""; // Untuk simpan base64 sementara pas "crop"

        // --- CEK AUTO LOGIN SAAT REFRESH / BUKA CHROME ---
        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('username');
            const savedPhoto = localStorage.getItem('profilePhoto');

            if (savedName) {
                // Jika sudah ada data login, langsung hilangkan tab login
                document.getElementById('login-page').style.opacity = '0';
                document.getElementById('login-page').style.visibility = 'hidden';
                document.getElementById('user-display-name').textContent = savedName;
                
                // Load foto jika ada
                if (savedPhoto) {
                    const imgEl = document.getElementById('profile-img');
                    const iconEl = document.getElementById('profile-icon');
                    imgEl.src = savedPhoto;
                    imgEl.classList.remove('hidden');
                    iconEl.classList.add('hidden');
                }
            }
        });

        // --- PROSES LOGIN ---
        function handleLogin() {
            const nameInput = document.getElementById('username-input').value.trim();
            if (nameInput === "") {
                alert("Nama lo jangan kosong dong!");
                return;
            }

            // Simpan ke localStorage biar permanen
            localStorage.setItem('username', nameInput);
            document.getElementById('user-display-name').textContent = nameInput;

            // Transisi hilangkan tab login
            const loginPage = document.getElementById('login-page');
            loginPage.style.opacity = '0';
            setTimeout(() => {
                loginPage.style.visibility = 'hidden';
            }, 500);
        }

        // --- PINDAH TAB (BOTTOM NAV) ---
        function switchTab(tabName, element) {
            // Ubah class aktif di Bottom Nav
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            // Ganti Title di Header
            const titles = { home: 'Home', chat: 'Chat Public', music: 'Music', account: 'Account' };
            document.getElementById('header-title').textContent = titles[tabName];

            // Pindah Konten Secara Smooth
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');

            // Reset hitungan klik profil jika pindah tab
            clickCount = 0;
            document.getElementById('profile-hint-text').textContent = "";
        }

        // --- SIDEBAR (GARIS 3) ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // --- LOGIKA PROFIL & SIMULASI CROP ---
        function handleProfileClick() {
            const hintText = document.getElementById('profile-hint-text');
            
            if (clickCount === 0) {
                hintText.textContent = "Pencet Ini Lagi Untuk Memasang Profil";
                clickCount++;
            } else if (clickCount === 1) {
                // Trigger input file/galeri
                document.getElementById('file-input').click();
                clickCount = 0; // reset
                hintText.textContent = "";
            }
        }

        function onFileSelected(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    tempImgData = e.target.result;
                    
                    // Munculkan modal "Crop" preview
                    document.getElementById('crop-preview').src = tempImgData;
                    document.getElementById('crop-modal').classList.add('active');
                }
                reader.readAsDataURL(file);
            }
        }

        function saveCroppedImage() {
            // Simpan foto permanen ke localStorage
            localStorage.setItem('profilePhoto', tempImgData);

            // Pasang ke element img profil utama
            const imgEl = document.getElementById('profile-img');
            const iconEl = document.getElementById('profile-icon');
            
            imgEl.src = tempImgData;
            imgEl.classList.remove('hidden');
            iconEl.classList.add('hidden');

            // Tutup modal crop
            document.getElementById('crop-modal').classList.remove('active');
            // Reset input file biar bisa upload foto yang sama lagi nanti
            document.getElementById('file-input').value = "";
        }
    </script>
</body>
</html>
