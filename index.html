<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanzz Database - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="iosNotif" class="ios-notification"></div>

  <div class="login-box">
    <h2>Database Hanzz</h2>
    <form id="loginForm">
      <div class="input-field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="off" placeholder="Masukkan username" required>
      </div>
      <div class="input-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Masukkan password" required>
      </div>
      <button type="submit" id="btnSubmit">Login</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
