<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Secure Awesome App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        .page-fade { transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans h-screen flex flex-col overflow-hidden select-none">

    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl border border-slate-800 w-full max-w-sm">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/30">
                <i class="fa-solid fa-lock text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold mb-1 text-center">Login Akun</h2>
            <p class="text-slate-400 text-sm mb-6 text-center">Verifikasi database untuk masuk ke aplikasi.</p>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="text-xs text-slate-400 font-semibold uppercase tracking-wider block mb-1.5">Email / Username</label>
                    <input type="text" id="login-email" placeholder="Masukkan email lo" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-all font-medium">
                </div>
                <div>
                    <label class="text-xs text-slate-400 font-semibold uppercase tracking-wider block mb-1.5">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-all font-medium">
                </div>
            </div>

            <div id="login-loading" class="hidden text-center text-sm text-blue-400 mb-3 animate-pulse">
                <i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Mengecek ke database...
            </div>

            <button onclick="handleDatabaseLogin()" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-blue-500/20 flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> Autentikasi Masuk
            </button>
        </div>
    </div>

    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 px-4 py-4 flex items-center justify-between sticky top-0 z-30">
        <button onclick="toggleSidebar(true)" class="w-10 h-10 flex flex-col justify-center items-start gap-1.5 hover:bg-slate-800 rounded-lg p-2 transition-all">
            <span class="w-6 h-0.5 bg-white rounded-full"></span>
            <span class="w-8 h-0.5 bg-white rounded-full"></span>
            <span class="w-5 h-0.5 bg-white rounded-full"></span>
        </button>
        <h1 id="app-title" class="font-bold text-lg tracking-wide text-slate-200">Home</h1>
        <div class="w-10"></div>
    </header>

    <div id="sidebar-overlay" onclick="toggleSidebar(false)" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>
    <div id="sidebar" class="fixed top-0 left-0 bottom-0 w-72 bg-slate-950 z-50 transform -translate-x-full transition-transform duration-300 ease-out border-r border-slate-800 p-6 flex flex-col justify-between">
        <div>
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center"><i class="fa-solid fa-layer-group text-sm"></i></div>
                    <span class="font-bold text-lg">Menu Utama</span>
                </div>
                <button onclick="toggleSidebar(false)" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <button class="w-full bg-amber-500/10 border border-amber-500/30 text-amber-400 font-medium py-3 px-4 rounded-xl cursor-not-allowed flex items-center justify-center gap-2└──">
                <i class="fa-solid fa-triangle-exclamation"></i> On Maintenance
            </button>
        </div>
        <button onclick="handleLogout()" class="text-left text-sm text-rose-400 hover:text-rose-300 font-medium py-2 flex items-center gap-2">
            <i class="fa-solid fa-right-from-bracket"></i> Keluar Akun (Logout)
        </button>
    </div>

    <main class="flex-1 overflow-y-auto p-6 flex flex-col items-center justify-center relative bg-gradient-to-b from-slate-900 to-slate-950">
        <div id="maintenance-tab" class="page-fade flex flex-col items-center text-center max-w-sm">
            <div class="w-24 h-24 bg-amber-500/10 text-amber-500 rounded-full flex items-center justify-center mb-6 border border-amber-500/20 shadow-xl shadow-amber-500/5">
                <i class="fa-solid fa-screwdriver-wrench text-4xl animate-bounce"></i>
            </div>
            <h2 class="text-2xl font-black tracking-tight mb-2">Maintenance Cuy</h2>
            <p class="text-slate-400 text-sm leading-relaxed">Fitur ini lagi digodok sama developer handal. Tunggu info rilis selanjutnya ya!</p>
        </div>

        <div id="account-tab" class="page-fade hidden flex flex-col items-center text-center w-full max-w-sm">
            <div class="relative group cursor-pointer mb-6" onclick="triggerProfileClick()">
                <div class="w-32 h-32 rounded-full overflow-hidden bg-slate-800 border-4 border-slate-700 flex items-center justify-center shadow-2xl relative transition-all group-hover:border-blue-500" id="profile-container">
                    <i id="profile-icon" class="fa-solid fa-user text-5xl text-slate-600"></i>
                    <img id="profile-img" src="" class="w-full h-full object-cover hidden">
                    <div class="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fa-solid fa-camera text-xl text-white"></i>
                    </div>
                </div>
            </div>
            <p id="profile-instruction" class="text-xs font-semibold text-blue-400 bg-blue-500/10 border border-blue-500/20 px-4 py-1.5 rounded-full mb-6 max-w-[250px]">
                Pencet Ini Lagi Untuk Memasang Profil
            </p>
            <h3 id="display-name" class="text-2xl font-bold tracking-wide text-white mb-1">Nama User</h3>
            <p class="text-xs text-slate-500 font-medium uppercase tracking-widest">Verified Account</p>
            <input type="file" id="image-input" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
        </div>
    </main>

    <div id="cropper-modal" class="fixed inset-0 bg-black/90 z-50 hidden flex-col justify-between p-6">
        <div class="flex items-center justify-between">
            <h3 class="text-lg font-bold">Sesuaikan Foto</h3>
            <button onclick="closeCropperModal()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div class="max-w-full max-h-[65vh] flex items-center justify-center overflow-hidden my-auto rounded-xl">
            <img id="cropper-image" src="" class="max-w-full">
        </div>
        <div class="flex gap-4">
            <button onclick="closeCropperModal()" class="flex-1 bg-slate-800 text-white font-semibold py-3.5 rounded-xl transition-all">Batal</button>
            <button onclick="saveCroppedImage()" class="flex-1 bg-blue-600 text-white font-semibold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-500/20">Selesai</button>
        </div>
    </div>

    <nav class="bg-slate-900/90 backdrop-blur-md border-t border-slate-800 pb-safe pt-2 px-2 flex justify-around items-center sticky bottom-0 z-30">
        <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-blue-500 transition-all w-20">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[10px] font-bold tracking-wider uppercase">Home</span>
        </button>
        <button onclick="switchTab('chat')" id="nav-chat" class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-slate-500 transition-all w-20">
            <i class="fa-solid fa-comments text-lg"></i>
            <span class="text-[10px] font-bold tracking-wider uppercase">Chat Public</span>
        </button>
        <button onclick="switchTab('music')" id="nav-music" class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-slate-500 transition-all w-20">
            <i class="fa-solid fa-music text-lg"></i>
            <span class="text-[10px] font-bold tracking-wider uppercase">Music</span>
        </button>
        <button onclick="switchTab('account')" id="nav-account" class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-slate-500 transition-all w-20">
            <i class="fa-solid fa-user text-lg"></i>
            <span class="text-[10px] font-bold tracking-wider uppercase">Account</span>
        </button>
    </nav>

    <script>
        let currentTab = 'home';
        let cropperInstance = null;

        // --- 1. PERSISTENT LOGIN CHECK DENGAN SECURITY CHECK ---
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('app_auth_token');
            const savedUser = localStorage.getItem('app_username');
            const savedProfile = localStorage.getItem('app_profile_img');
            
            // Jika ada Token Keamanan, anggap dia masih ter-autentikasi (HP mati ga masalah)
            if (token && savedUser) {
                document.getElementById('login-screen').classList.add('hidden', 'opacity-0');
                document.getElementById('display-name').innerText = savedUser;
                
                if (savedProfile) {
                    const img = document.getElementById('profile-img');
                    img.src = savedProfile;
                    img.classList.remove('hidden');
                    document.getElementById('profile-icon').classList.add('hidden');
                }
            }
        });

        // --- 2. FUNGSI KIRIM DATA KE DATABASE (REAL BACKEND AUTH) ---
        async function handleDatabaseLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const loading = document.getElementById('login-loading');

            if (!email || !password) return alert('Wajib isi Email dan Password bro!');

            loading.classList.remove('hidden'); // Tampilkan loading spinner

            try {
                /* SISTEM INTEGRASI DATABASE:
                  Ganti URL di bawah dengan alamat API Backend/Database asli lo (Node.js, PHP, Firebase, Supabase, dll.)
                */
                // const response = await fetch('https://api.domainlo.com/login', {
                //     method: 'POST',
                //     headers: { 'Content-Type': 'application/json' },
                //     body: JSON.stringify({ email, password })
                // });
                // const data = await response.json();

                // --- SIMULASI RESPONS DATA BERHASIL DARI DATABASE ---
                // Nanti bagian simulasi ini tinggal lo hapus kalau API aslinya udah aktif!
                await new Promise(resolve => setTimeout(resolve, 1500)); // Simulasi delay internet
                const fakeDbResponse = {
                    success: true,
                    token: "JWT_SECURE_TOKEN_REALS_12345", // Token acak dari DB
                    username: email.split('@')[0], // Contoh ngambil nama depan email
                };

                if (fakeDbResponse.success) {
                    // Simpan token auth dan data ke localStorage biar persistent
                    localStorage.setItem('app_auth_token', fakeDbResponse.token);
                    localStorage.setItem('app_username', fakeDbResponse.username);
                    
                    document.getElementById('display-name').innerText = fakeDbResponse.username;

                    // Efek transisi masuk aplikasi
                    const loginScreen = document.getElementById('login-screen');
                    loginScreen.classList.add('opacity-0');
                    setTimeout(() => loginScreen.classList.add('hidden'), 500);
                } else {
                    alert('Gagal autentikasi! Akun tidak terdaftar di database.');
                }

            } catch (error) {
                console.error(error);
                alert('Waduh, gagal koneksi ke database backend!');
            } finally {
                loading.classList.add('hidden');
            }
        }

        function handleLogout() {
            localStorage.clear(); // Hapus token auth biar aman total pas keluar
            location.reload();
        }

        // --- 3. SIDEBAR & TAB SWITCHING SYSTEM ---
        function toggleSidebar(open) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (open) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function switchTab(tabName) {
            if (currentTab === tabName) return;
            currentTab = tabName;

            const maintenanceTab = document.getElementById('maintenance-tab');
            const accountTab = document.getElementById('account-tab');
            document.getElementById('app-title').innerText = { home: 'Home', chat: 'Chat Public', music: 'Music', account: 'Account' }[tabName];

            ['home', 'chat', 'music', 'account'].forEach(t => {
                const navBtn = document.getElementById(`nav-${t}`);
                t === tabName ? (navBtn.classList.remove('text-slate-500'), navBtn.classList.add('text-blue-500')) : (navBtn.classList.remove('text-blue-500'), navBtn.classList.add('text-slate-500'));
            });

            const activeTabContent = (tabName === 'account') ? accountTab : maintenanceTab;
            const hiddenTabContent = (tabName === 'account') ? maintenanceTab : accountTab;

            hiddenTabContent.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                hiddenTabContent.classList.add('hidden');
                activeTabContent.classList.remove('hidden');
                setTimeout(() => activeTabContent.classList.remove('opacity-0', 'scale-95'), 50);
            }, 150);
        }

        // --- 4. IMAGE CROPPER & PROFILE SYSTEM ---
        function triggerProfileClick() { document.getElementById('image-input').click(); }
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const cropperImage = document.getElementById('cropper-image');
                cropperImage.src = e.target.result;
                document.getElementById('cropper-modal').classList.replace('hidden', 'flex');
                if (cropperInstance) cropperInstance.destroy();
                cropperInstance = new Cropper(cropperImage, { aspectRatio: 1, viewMode: 1, background: false });
            };
            reader.readAsDataURL(file);
        }
        function closeCropperModal() {
            document.getElementById('cropper-modal').classList.replace('flex', 'hidden');
            document.getElementById('image-input').value = '';
            if (cropperInstance) cropperInstance.destroy();
        }
        function saveCroppedImage() {
            if (!cropperInstance) return;
            const canvas = cropperInstance.getCroppedCanvas({ width: 300, height: 300 });
            const croppedImageDataUrl = canvas.toDataURL('image/jpeg');
            const img = document.getElementById('profile-img');
            img.src = croppedImageDataUrl;
            img.classList.remove('hidden');
            document.getElementById('profile-icon').classList.add('hidden');
            localStorage.setItem('app_profile_img', croppedImageDataUrl);
            closeCropperModal();
        }
    </script>
</body>
</html>
