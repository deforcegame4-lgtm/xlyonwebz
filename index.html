<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanzz Database - Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #090d16, #111827);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Container Login */
    .login-box {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 40px 30px;
      border-radius: 24px;
      width: 100%;
      max-width: 360px;
      color: #ffffff;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .input-field {
      margin-bottom: 20px;
    }

    .input-field label {
      display: block;
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .input-field input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-field input:focus {
      border-color: #3b82f6;
      background: rgba(255, 255, 255, 0.08);
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #2563eb;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 10px;
    }

    button:hover {
      background: #1d4ed8;
    }

    /* --- NOTIFIKASI IPHONE GLASSMORPHISM (SMOOTH FX) --- */
    .ios-notification {
      position: fixed;
      top: -100px; /* Sembunyi di atas layar */
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      width: 90%;
      max-width: 340px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 16px;
      color: #ffffff;
      font-weight: 500;
      font-size: 14px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      /* Animasi Masuk: Efek mantul smooth khas iOS */
      transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                  transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                  opacity 0.4s ease;
    }

    /* Class saat Notif Muncul */
    .ios-notification.show {
      top: 24px;
      transform: translateX(-50%) scale(1);
      opacity: 1;
    }

    /* Class saat Notif Keluar (Smooth Keluar) */
    .ios-notification.hide {
      top: -100px;
      transform: translateX(-50%) scale(0.85);
      opacity: 0;
      /* Animasi Keluar: Berakselerasi halus ke atas */
      transition: top 0.5s cubic-bezier(0.55, 0.055, 0.675, 0.19), 
                  transform 0.5s cubic-bezier(0.55, 0.055, 0.675, 0.19), 
                  opacity 0.4s ease;
    }
  </style>
</head>
<body>

  <div id="iosNotif" class="ios-notification"></div>

  <div class="login-box">
    <h2>Database Hanzz</h2>
    <form id="loginForm">
      <div class="input-field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="off" placeholder="Masukkan username" required>
      </div>
      <div class="input-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Masukkan password" required>
      </div>
      <button type="submit" id="btnSubmit">Login</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btnSubmit = document.getElementById('btnSubmit');
      
      btnSubmit.disabled = true;
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        showIosNotification(data.message);
        
      } catch (error) {
        showIosNotification("Gagal terhubung ke server!");
      } finally {
        btnSubmit.disabled = false;
      }
    });

    function showIosNotification(text) {
      const notif = document.getElementById('iosNotif');
      
      notif.innerText = text;
      
      // Reset status class
      notif.classList.remove('hide');
      // Trigger animasi masuk smooth
      notif.classList.add('show');
      
      // Clear timeout lama biar ga bertabrakan kalau di-spam klik
      if (window.notifTimer) clearTimeout(window.notifTimer);
      
      // Cooldown 4 detik (4000ms) untuk dibaca, lalu animasi keluar smooth
      window.notifTimer = setTimeout(() => {
        notif.classList.remove('show');
        notif.classList.add('hide');
      }, 4000);
    }
  </script>
</body>
</html>
